<!DOCTYPE html>
<html>
<head>
    <title>Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2 class="mb-4">📊 Historial del sistema</h2>

<a href="/dashboard" class="btn btn-secondary">⬅ Volver</a>

<table class="table table-striped table-bordered text-center">
    <thead class="table-dark">
        <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        {% for h in historial %}
        <tr>

            <td>{{ h[3] }}</td>

            <td>
    {% if "VENTA" in h[1] %}
        <span class="badge bg-success">VENTA</span>
    {% elif "GASTO" in h[1] %}
        <span class="badge bg-danger">GASTO</span>
    {% else %}
        <span class="badge bg-secondary">{{ h[1] }}</span>
    {% endif %}
</td>

            <td>{{ h[2] }}</td>

            <td>
                <form action="/restaurar_historial/{{ h[0] }}" method="POST" style="display:inline;">
                    <button class="btn btn-success btn-sm">♻️</button>
                </form>

                <form action="/eliminar_historial/{{ h[0] }}" method="POST" style="display:inline;">
                    <button class="btn btn-danger btn-sm">🗑</button>
                </form>
            </td>

        </tr>
        {% endfor %}
    </tbody>
</table>


</body>
</html>
