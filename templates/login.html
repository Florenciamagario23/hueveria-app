<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Huevería</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 text-center">

    <h2 class="mb-4">🥚 Huevería Los Primos</h2>

    <form method="POST" class="col-md-4 mx-auto">

        <input type="text" name="usuario" placeholder="Usuario" class="form-control mb-3" required>

        <input type="password" name="password" placeholder="Contraseña" class="form-control mb-3" required>

        <button class="btn btn-dark w-100">Ingresar</button>

    </form>

    {% if error %}
        <div class="alert alert-danger mt-3">
            {{ error }}
        </div>
    {% endif %}

</div>

</body>
</html>
