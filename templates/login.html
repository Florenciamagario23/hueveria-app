<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Huevería</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- 🔙 BOTÓN VOLVER -->
<div class="position-absolute top-0 start-0 m-3">
    <a href="/" class="btn btn-light shadow-sm">
        ⬅ Inicio
    </a>
</div>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="login-card col-md-4 text-center">

        <h2 class="mb-4">🥚 Huevería Los Primos</h2>

        <form method="POST">

            <!-- USUARIO -->
            <input type="text" name="usuario" placeholder="Usuario" class="form-control mb-3" required>

            <!-- CONTRASEÑA CON 👁️ -->
            <div class="input-group mb-3">
                <input type="password" name="password" id="password" placeholder="Contraseña" class="form-control" required>

                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword(this)">
                    👁️
                </button>
            </div>

            <!-- BOTÓN -->
            <button class="btn btn-dark w-100">Ingresar</button>

        </form>

        {% if error %}
            <div class="alert alert-danger mt-3">
                {{ error }}
            </div>
        {% endif %}

    </div>

</div>

<!-- 👁️ SCRIPT -->
<script>
function togglePassword(btn) {
    const input = document.getElementById("password");

    if (input.type === "password") {
        input.type = "text";
        btn.innerHTML = "🙈";
    } else {
        input.type = "password";
        btn.innerHTML = "👁️";
    }
}
</script>

</body>
</html>
